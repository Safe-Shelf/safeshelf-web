<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>SafeShelf</title>
    <meta
      name="description"
      content="SafeShelf — personal product safety monitor. Open magic links on your phone with the app installed."
    />
    <style>
      :root {
        color-scheme: light dark;
        --forest: #1d5d50;
        --cream: #faf4e8;
        --ink: #1d1c14;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: system-ui, -apple-system, sans-serif;
        background: var(--cream);
        color: var(--ink);
        padding: 24px;
      }
      main {
        max-width: 420px;
        text-align: center;
      }
      h1 {
        font-size: 1.75rem;
        margin: 0 0 12px;
        color: var(--forest);
      }
      p {
        line-height: 1.5;
        margin: 0 0 16px;
        opacity: 0.85;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SafeShelf</h1>
      <p>
        This page supports magic-link sign-in for the SafeShelf mobile app. If you
        received a sign-in email, open the link on your phone with SafeShelf
        installed.
      </p>
      <p>
        Looking for the app? Download SafeShelf from the App Store or Google Play
        when available.
      </p>
    </main>
  </body>
</html>
