<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>∅</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
      @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400&display=swap');

      :root {
        --void: #070809;
        --panel: #0e1114;
        --line: #1a2128;
        --ghost: #3d4a56;
        --pulse: #5a7a6e;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--void);
        color: var(--ghost);
        font-family: 'IBM Plex Mono', ui-monospace, monospace;
        font-weight: 300;
        font-size: 13px;
        letter-spacing: 0.04em;
      }

      body {
        display: grid;
        place-items: center;
        padding: 2rem;
      }

      .frame {
        width: min(380px, 100%);
        border: 1px solid var(--line);
        background: var(--panel);
        padding: 2rem 1.75rem;
        text-align: center;
      }

      .sigil {
        font-size: 10px;
        color: var(--pulse);
        opacity: 0.55;
        margin-bottom: 1.25rem;
      }

      p {
        margin: 0;
        line-height: 1.7;
        opacity: 0.5;
        font-size: 11px;
      }

      .hash {
        margin-top: 1.5rem;
        padding-top: 1rem;
        border-top: 1px solid var(--line);
        font-size: 10px;
        opacity: 0.3;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="sigil">handshake · pending</div>
      <p>
        token route unresolved<br />
        client required
      </p>
      <div class="hash">0x00 · null carrier</div>
    </div>
  </body>
</html>
